services:
  db:
    image: postgres:16-alpine
    container_name: king-poker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kingpoker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kingpoker}
      POSTGRES_DB: ${POSTGRES_DB:-kingpoker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kingpoker} -d ${POSTGRES_DB:-kingpoker}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
